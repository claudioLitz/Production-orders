<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production Orders System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --border:   #1e1e2e;
      --accent:   #00e5c0;
      --accent2:  #ff6b35;
      --text:     #e8e8f0;
      --muted:    #5a5a7a;
      --danger:   #ff4466;
      --success:  #00e5c0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,192,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,192,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      padding: 0 2.5rem;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border: 2px solid var(--accent);
      display: grid;
      place-items: center;
      position: relative;
    }

    .logo-mark::after {
      content: '';
      width: 12px;
      height: 12px;
      background: var(--accent);
    }

    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
    }

    .logo h1 span { color: var(--accent); }

    #status-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 5px 14px;
      border: 1px solid var(--muted);
      color: var(--muted);
      letter-spacing: 0.08em;
      transition: all 0.3s;
    }

    #status-badge.online {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px rgba(0,229,192,0.2);
    }

    #status-badge.offline {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ── Section label ── */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
      position: relative;
      animation: fadeUp 0.5s ease both;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(2) { animation-delay: 0.1s; }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 680px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.65rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }

    input::placeholder { color: var(--muted); }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,192,0.08);
    }

    select option { background: var(--surface); }

    /* ── Buttons ── */
    #btn-register {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.7rem 2rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    #btn-register:hover {
      opacity: 0.9;
      box-shadow: 0 0 20px rgba(0,229,192,0.35);
    }

    #btn-register:active { transform: scale(0.98); }
    #btn-register:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-refresh {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.5rem 1.2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-refresh:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-delete {
      background: transparent;
      border: 1px solid rgba(255,68,102,0.3);
      color: var(--danger);
      padding: 4px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delete:hover {
      background: rgba(255,68,102,0.1);
      border-color: var(--danger);
    }

    /* ── Message ── */
    .message {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      border-left: 3px solid;
      animation: fadeUp 0.3s ease;
    }

    .message.success {
      background: rgba(0,229,192,0.06);
      border-color: var(--success);
      color: var(--success);
    }

    .message.error {
      background: rgba(255,68,102,0.06);
      border-color: var(--danger);
      color: var(--danger);
    }

    .hidden { display: none; }

    /* ── List header ── */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    /* ── Table ── */
    .container-table { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead tr {
      border-bottom: 1px solid var(--border);
    }

    th {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.75rem 1rem;
      text-align: left;
      font-weight: 500;
      background: transparent;
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid rgba(30,30,46,0.8);
      color: var(--text);
      vertical-align: middle;
    }

    tbody tr {
      transition: background 0.15s;
    }

    tbody tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    /* ── ID cell ── */
    .cell-id {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .badge-pending {
      background: rgba(255,107,53,0.1);
      color: var(--accent2);
      border: 1px solid rgba(255,107,53,0.25);
    }
    .badge-pending::before { background: var(--accent2); }

    .badge-working {
      background: rgba(100,149,237,0.1);
      color: #6495ed;
      border: 1px solid rgba(100,149,237,0.25);
    }
    .badge-working::before { background: #6495ed; animation: pulse 1.5s infinite; }

    .badge-done {
      background: rgba(0,229,192,0.08);
      color: var(--accent);
      border: 1px solid rgba(0,229,192,0.2);
    }
    .badge-done::before { background: var(--accent); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Select status ── */
    .select-status {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .select-status:focus { border-color: var(--accent); }

    /* ── Actions cell ── */
    .cell-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Loading ── */
    #loading {
      text-align: center;
      padding: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    #loading::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    #without-data {
      text-align: center;
      padding: 3rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── Row count ── */
    .row-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .row-count span {
      color: var(--accent);
      font-weight: 500;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark"></div>
        <h1>Production <span>Orders</span></h1>
      </div>
      <span id="status-badge">CONNECTING</span>
    </div>
  </header>

  <main>

    <section class="card">
      <div class="section-label">New Order</div>

      <div class="form-grid">
        <div class="form-group">
          <label for="product">Product name</label>
          <input type="text" id="product" placeholder="Ex: WEG W22 Motor">
        </div>
        <div class="form-group">
          <label for="quantity">Quantity</label>
          <input type="number" id="quantity" placeholder="100" min="1">
        </div>
        <div class="form-group">
          <label for="new-status">Initial status</label>
          <select id="new-status">
            <option value="Pending">Pending</option>
            <option value="In working">In working</option>
            <option value="Done">Done</option>
          </select>
        </div>
      </div>

      <button id="btn-register" onclick="createOrder()">Register Order</button>
      <div id="message" class="hidden message"></div>
    </section>

    <section class="card">
      <div class="list-header">
        <div class="section-label" style="margin-bottom:0; flex:1">Registered Orders</div>
        <div style="display:flex; align-items:center; gap:1rem">
          <span class="row-count" id="row-count"></span>
          <button class="btn-refresh" onclick="loadOrders()">↻ Refresh</button>
        </div>
      </div>

      <div id="loading" class="hidden">LOADING</div>

      <div class="container-table">
        <table id="orders-table">
          <thead>
            <tr>
              <th>#ID</th>
              <th>Product</th>
              <th>Qty</th>
              <th>Status</th>
              <th>Created at</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

      <p id="without-data" class="hidden">— NO ORDERS REGISTERED —</p>
    </section>

  </main>

  <script>
    const API_URL = 'http://localhost:5000';
    const API_KEY = 'senai-cibersistemas-2026-chave-segura';

    const headersAutenticados = {
      'Content-Type': 'application/json',
      'X-API-Key': API_KEY
    };

    async function checkStatus() {
      const badge = document.getElementById('status-badge');
      try {
        const response = await fetch(`${API_URL}/status`);
        const data = await response.json();
        badge.textContent = `ONLINE · ${data.total_ordens} ORDERS`;
        badge.className = 'online';
      } catch {
        badge.textContent = 'OFFLINE';
        badge.className = 'offline';
      }
    }

    async function loadOrders() {
      const loading = document.getElementById('loading');
      const noData = document.getElementById('without-data');
      const table = document.getElementById('orders-table');
      const tbody = document.getElementById('table-body');
      const count = document.getElementById('row-count');

      loading.classList.remove('hidden');
      table.classList.add('hidden');
      noData.classList.add('hidden');
      count.innerHTML = '';

      try {
        const response = await fetch(`${API_URL}/ordens`);
        const orders = await response.json();
        loading.classList.add('hidden');

        if (orders.length === 0) {
          noData.classList.remove('hidden');
          return;
        }

        count.innerHTML = `<span>${orders.length}</span> orders`;

        tbody.innerHTML = orders.map(order => `
          <tr id="row-${order.id}">
            <td class="cell-id">#${String(order.id).padStart(4,'0')}</td>
            <td>${order.produto}</td>
            <td style="font-family:'DM Mono',monospace; font-size:0.85rem">${order.quantidade}</td>
            <td>${renderBadge(order.status)}</td>
            <td style="font-family:'DM Mono',monospace; font-size:0.75rem; color:var(--muted)">${order.criado_em}</td>
            <td>
              <div class="cell-actions">
                <select class="select-status" onchange="updateStatus(${order.id}, this.value)">
                  <option value="Pending"    ${order.status==='Pending'    ? 'selected':''}>Pending</option>
                  <option value="In working" ${order.status==='In working' ? 'selected':''}>In working</option>
                  <option value="Done"       ${order.status==='Done'       ? 'selected':''}>Done</option>
                </select>
                <button class="btn-delete" onclick="deleteOrder(${order.id})">Delete</button>
              </div>
            </td>
          </tr>
        `).join('');

        table.classList.remove('hidden');
      } catch {
        loading.classList.add('hidden');
        showMessage('Error connecting to API. Is the server running?', 'error');
      }
    }

    function renderBadge(status) {
      const map = {
        'Pending':    'badge badge-pending',
        'In working': 'badge badge-working',
        'Done':       'badge badge-done'
      };
      return `<span class="${map[status] || 'badge'}">${status}</span>`;
    }

    async function createOrder() {
      const product  = document.getElementById('product').value.trim();
      const quantity = document.getElementById('quantity').value;
      const status   = document.getElementById('new-status').value;

      if (!product) { showMessage('Please enter the product name.', 'error'); return; }
      if (!quantity || Number(quantity) <= 0) { showMessage('Please enter a valid quantity.', 'error'); return; }

      const btn = document.getElementById('btn-register');
      btn.disabled = true;
      btn.textContent = 'Registering...';

      try {
        const response = await fetch(`${API_URL}/ordens`, {
          method: 'POST',
          headers: headersAutenticados,
          body: JSON.stringify({ produto: product, quantidade: Number(quantity), status })
        });
        const data = await response.json();

        if (response.ok) {
          showMessage(`Order #${data.id} registered successfully.`, 'success');
          document.getElementById('product').value = '';
          document.getElementById('quantity').value = '';
          document.getElementById('new-status').value = 'Pending';
          await loadOrders();
          await checkStatus();
        } else {
          showMessage(data.erro || 'Error registering order.', 'error');
        }
      } catch {
        showMessage('API connection error.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Register Order';
      }
    }

    async function updateStatus(id, newStatus) {
      try {
        const response = await fetch(`${API_URL}/ordens/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus })
        });
        const data = await response.json();

        if (response.ok) {
          showMessage(`Order #${id} → ${newStatus}`, 'success');
          const row = document.getElementById(`row-${id}`);
          if (row) row.cells[3].innerHTML = renderBadge(newStatus);
        } else {
          showMessage(data.erro || 'Error updating status.', 'error');
          await loadOrders();
        }
      } catch {
        showMessage('Connection error.', 'error');
      }
    }

    async function deleteOrder(id) {
      if (!confirm(`Delete Order #${id}? This action is permanent.`)) return;
      try {
        const response = await fetch(`${API_URL}/ordens/${id}`, {
          method: 'DELETE',
          headers: { 'X-API-Key': API_KEY }
        });
        const data = await response.json();

        if (response.ok) {
          showMessage(data.mensagem || 'Order deleted.', 'success');
          const row = document.getElementById(`row-${id}`);
          if (row) row.remove();
          const tbody = document.getElementById('table-body');
          if (tbody.children.length === 0) {
            document.getElementById('orders-table').classList.add('hidden');
            document.getElementById('without-data').classList.remove('hidden');
            document.getElementById('row-count').innerHTML = '';
          } else {
            const n = tbody.children.length;
            document.getElementById('row-count').innerHTML = `<span>${n}</span> orders`;
          }
          await checkStatus();
        } else {
          showMessage(data.erro || 'Error deleting order.', 'error');
        }
      } catch {
        showMessage('Connection error.', 'error');
      }
    }

    function showMessage(text, type) {
      const div = document.getElementById('message');
      div.textContent = text;
      div.className = `message ${type}`;
      div.classList.remove('hidden');
      setTimeout(() => div.classList.add('hidden'), 4000);
    }

    window.onload = async function() {
      await checkStatus();
      await loadOrders();
    };
  </script>
</body>
</html>
