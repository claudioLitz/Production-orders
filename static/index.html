<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Produção | SENAI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><span class="material-icons">precision_manufacturing</span> AutoSys</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="active"><span class="material-icons">dashboard</span> Dashboard</a>
                <a href="#"><span class="material-icons">list_alt</span> Ordens (OP)</a>
                <a href="#"><span class="material-icons">analytics</span> Relatórios</a>
                <a href="#"><span class="material-icons">settings</span> Configurações</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1>Visão Geral da Produção</h1>
                <div class="system-status">
                    <span class="status-dot" id="connection-dot"></span>
                    <span id="connection-text">Verificando...</span>
                </div>
            </header>

            <section class="summary-cards">
                <div class="card">
                    <div class="card-info">
                        <h3>Total de Ordens</h3>
                        <p id="total-ordens">0</p>
                    </div>
                    <span class="material-icons card-icon">assignment</span>
                </div>
                <div class="card">
                    <div class="card-info">
                        <h3>Servidor</h3>
                        <p id="server-time">--:--:--</p>
                    </div>
                    <span class="material-icons card-icon">dns</span>
                </div>
            </section>

            <section class="data-section">
                <div class="section-header">
                    <h2>Ordens Recentes</h2>
                    <button class="btn-primary"><span class="material-icons">add</span> Nova Ordem</button>
                </div>
                <div class="table-container">
                    <table id="ordens-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Produto</th>
                                <th>Qtd.</th>
                                <th>Status</th>
                                <th>Criado Em</th>
                            </tr>
                        </thead>
                        <tbody id="ordens-body">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
