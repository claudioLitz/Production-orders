<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Manufatura</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <span class="material-icons">factory</span>
            <span>Painel de Manufatura</span>
        </div>
        <div class="server-status">
            <span id="status-indicator" class="indicator offline"></span>
            <span id="status-text">A ligar...</span>
            <small id="server-time"></small>
        </div>
    </header>

    <main class="container">
        <section class="panel form-panel">
            <h2><span class="material-icons">add_circle_outline</span> Nova Ordem de Produção</h2>
            <form id="form-ordem">
                <div class="input-group">
                    <label for="produto">Nome do Produto</label>
                    <input type="text" id="produto" placeholder="Ex: Motor Elétrico 5CV" required>
                </div>
                <div class="input-group">
                    <label for="quantidade">Quantidade (un.)</label>
                    <input type="number" id="quantidade" min="1" placeholder="Ex: 50" required>
                </div>
                <button type="submit" class="btn-submit">Criar Ordem</button>
            </form>
        </section>

        <section class="panel list-panel">
            <div class="panel-header">
                <h2><span class="material-icons">view_list</span> Ordens Registadas</h2>
                <div class="total-badge">Total: <span id="total-ordens">0</span></div>
            </div>
            
            <div class="grid-ordens" id="grid-ordens">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
